  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nsform: translateY(-2px); }\n  .btn-ghost { color: var(--fg); border-color: var(--line-2); }\n  .btn-ghost:hover { border-color: var(--fg); background: rgba(245,245,240,0.04); }\n\n  /* ---------------- SECTION SHELL ---------------- */\n  section { position: relative; }\n  .section-pad { padding-block: clamp(80px, 11vw, 150px); }\n  .sec-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 18px; }\n  .sec-num { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; color: var(--fg-faint); }\n  .rule { height: 1px; background: var(--line); border: none; }\n\n  /* reveal */\n  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1); }\n  .reveal.in { opacity: 1; transform: none; }\n  .reveal.d1 { transition-delay: .08s; }\n  .reveal.d2 { transition-delay: .16s; }\n  .reveal.d3 { transition-delay: .24s; }\n  .reveal.d4 { transition-delay: .32s; }\n  @media (prefers-reduced-motion: reduce) { .reveal { opacity:1 !important; transform:none !important; } }\n  /* If the page renders while hidden (transitions are paused in inactive tabs), snap to final state */\n  body.reveal-instant .reveal { transition: none !important; opacity: 1 !important; transform: none !important; }\n\n  /* ---------------- HERO ---------------- */\n  .hero { position: relative; padding-top: 130px; padding-bottom: 40px; overflow: hidden; }\n  .hero-bg {\n    position: absolute; inset: 0; z-index: 0; pointer-events: none;\n    background:\n      radial-gradient(680px 460px at 78% 28%, rgba(59,110,245,0.18), transparent 70%),\n      radial-gradient(900px 600px at 10% 0%, rgba(59,110,245,0.06), transparent 65%);\n  }\n  .hero-grid-lines {\n    position: absolute; inset: 0; z-index: 0; pointer-events:none; opacity: .5;\n    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);\n    background-size: 64px 64px;\n    -webk  background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: sweep 3.4s linear infinite; }\n  @keyframes sweep { to { left: 110%; } }\n\n  /* Hero C — system panel */\n  .heroC-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }\n  @media (max-width: 980px) { .heroC-grid { grid-template-columns: 1fr; } }\n  .panel {\n    background: linear-gradient(180deg, var(--bg-2), #0c0c0b);\n    border: 1px solid var(--line-2); border-radius: 8px; overflow: hidden;\n    box-shadow: 0 40px 90px -40px rgba(0,0,0,0.9), 0 0 0 1px rgba(0,0,0,0.4);\n  }\n  .panel-bar { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.015); }\n  .panel-dots { display: flex; gap: 7px; }\n  .panel-dots i { width: 11px; height: 11px; border-radius: 50%; background: #2a2a28; display: block; }\n  .panel-title { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.12em; color: var(--fg-faint); text-transform: uppercase; white-space: nowrap; }\n  .panel-body { padding: 20px 20px 22px; font-family: var(--mono); font-size: 13.5px; line-height: 2.0; }\n  .log-row { display: flex; align-items: center; gap: 10px; white-space: nowrap; }\n  .log-row .lbl { color: var(--fg-dim); }\n  .log-row .dots { flex: 1; border-bottom: 1px dotted rgba(245,245,240,0.18); transform: translateY(-3px); min-width: 14px; }\n  .log-row .val { color: var(--fg); }\n  .tag-ok { color: #34c77b; }\n  .tag-run { color: var(--accent-2); }\n  .tag-build { color: #e0b54a; }\n  .cursor { display:inline-block; width: 9px; height: 16px; background: var(--accent); margin-left: 2px; transform: translateY(2px); animation: blink 1.1s steps(1) infinite; }\n  @keyframes blink { 50% { opacity: 0; } }\n\n  /* ---------------- PULL QUOTE ---------------- */\n  .quote { padding-block: clamp(70px, 9vw, 120px); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); position: relativ rgin-bottom: 8px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }\n  .arch-item h3 .vendor { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); font-weight: 500; }\n  .arch-item p { color: var(--fg-dim); font-size: 15px; line-height: 1.55; max-width: 46ch; }\n  .arch-visual { position: sticky; top: 100px; }\n  .bigloop { position: relative; aspect-ratio: 1; width: 100%; max-width: 460px; margin: 0 auto; }\n\n  /* ---------------- ROLLOUT ---------------- */\n  .phases { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 54px; }\n  @media (max-width: 820px){ .phases { grid-template-columns: 1fr; } }\n  .phase { border: 1px solid var(--line); border-radius: 8px; padding: 30px 28px 34px; background: var(--bg-2); position: relative; overflow: hidden; transition: border-color .3s, transform .3s; }\n  .phase:hover { border-color: var(--line-2); transform: translateY(-3px); }\n  .phase::before { content:\"\"; position:absolute; top:0; left:0; right:0; height:2px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform .5s cubic-bezier(.16,1,.3,1); }\n  .phase.in::before { transform: scaleX(1); }\n  .phase .pn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; color: var(--accent-2); }\n  .phase h3 { font-size: 1.5rem; margin: 16px 0 14px; }\n  .phase p { color: var(--fg-dim); font-size: 14.5px; line-height: 1.55; }\n  .phase .out { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); font-size: 13.5px; color: var(--fg-dim); }\n  .phase .out b { color: var(--fg); font-weight: 600; }\n  .feedback-note { margin-top: 26px; font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.04em; color: var(--fg-faint); display:flex; align-items:center; gap:10px; }\n  .feedback-note::before { content:\"↻\"; color: var(--accent); font-size: 16px; }\n\n  /* ---------------- ABOUT ---------------- */\n  .about { background: var(--bg-2); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }\n  .about-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: clamp(36px, 6vw, 80px); align-items: start; }\n  @media (max-width: 860px){ .about-grid { grid-template-columns: 1fr; } }\n  .about-lead { font-family: var(--display); font-weight: 500; letter-spacing: -0.025em; font-size: clamp(1.7rem,3.2vw,2.5rem); line-height: 1.14; }\n  .about-body p { color: var(--fg-dim); margin-bottom: 18px; max-width: 56ch; }\n  .about-body p strong { color: var(--fg); font-weight: 600; }\n  .creds { display: flex; flex-direction: column; gap: 0; margin-top: 30px; border-top: 1px solid var(--line); }\n  .cred { display: grid; grid-template-columns: 130px 1fr; gap: 18px; padding: 16px 0; border-bottom: 1px solid var(--line); align-items: baseline; }\n  .cred .y { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--accent-2); }\n  .cred .t { font-size: 15.5px; }\n  .cred .t span { color: var(--fg-faint); }\n\n  /* ---------------- CONTACT ---------------- */\n  .contact { position: relative; overflow: hidden; }\n  .contact .glow { position:absolute; inset:0; z-index:0; pointer-events:none; background: radial-gradient(600px 420px at 50% 120%, rgba(59,110,245,0.22), transparent 70%); }\n  .contact .wrap { position: relative; z-index: 2; text-align: center; }\n  .contact .display { font-size: clamp(2.6rem, 7vw, 6rem); }\n  .contact-sub { color: var(--fg-dim); max-width: 50ch; margin: 24px auto 0; font-size: 1.1rem; }\n  .email-btn {\n    display: inline-flex; align-items: center; gap: 16px; margin-top: 44px;\n    font-family: var(--mono); font-size: clamp(15px, 2.4vw, 22px); letter-spacing: 0.02em;\n    padding: 20px 34px; border: 1px solid var(--line-2); border-radius: 3px; color: var(--fg);\n    transition: border-color .25s, background .25s, color .25s, box-shadow .3s, transform .2s;\n  }\n  .email-btn:hover { background: var(--accent); border-color: var(--accent); color:#fff; transform: translateY(-2px); box-shadow: 0 16px 50px -16px var(--accent-glow); }\n  .email-btn .at { color: var(--accent-2); transition: color .25s; }\n  .email-btn:hover .at { color: #fff; }\n\n  /* ---------------- FOOTER ---------------- */\n  footer { border-top: 1px solid var(--line); padding-block: 40px; }\n  .foot-inner { display:flex; align-items:center; justify-content:space-between; gap: 20px; flex-wrap: wrap; }\n  .foot-inner .l { display:flex; align-items:center; gap: 12px; font-family: var(--display); font-weight:600; }\n  .foot-inner .r { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-faint); display:flex; gap: 26px; flex-wrap:wrap; }\n  .foot-inner .r a:hover { color: var(--fg); }\n\n  /* ---------------- HERO SWITCHER ---------------- */\n  .hero-switch {\n    position: fixed; left: 50%; transform: translateX(-50%); bottom: 22px; z-index: 200;\n    display: flex; align-items: center; gap: 4px; padding: 6px; border-radius: 100px;\n    background: rgba(18,18,17,0.86); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);\n    border: 1px solid var(--line-2); box-shadow: 0 14px 40px -14px rgba(0,0,0,0.8);\n  }\n  .hero-switch .hs-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-faint); padding: 0 10px 0 12px; }\n  .hero-switch button {\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--fg-dim); background: transparent; border: none; cursor: pointer;\n    padding: 9px 15px; border-radius: 100px; transition: background .2s, color .2s;\n  }\n  .hero-switch button:hover { color: var(--fg); }\n  .hero-switch button.active { background: var(--accent); color: #fff; }\n  @media (max-width: 560px){ .hero-switch .hs-label { display:none; } .hero-switch button { padding: 9px 12px; } }\n\n  /* orbit + loop svg styling */\n  .ring-track { fill: none; stroke: var(--line-2); stroke-width: 1.2; }\n  .ring-prog { fill: none; stroke: var(--accent); stroke-width: 1.6; stroke-linecap: round; }\n  .node-dot { fill: var(--bg); stroke: var(--line-2); stroke-width: 1.2; }\n  .node-dot.lit { fill: var(--accent); stroke: var(--accent); }\n  .node-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; fill: var(--fg-dim); text-transform: uppercase; }\n  .center-word { font-family: var(--display); font-weight: 600; fill: var(--fg); letter-spacing: -0.02em; }\n  .center-sub { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; fill: var(--fg-faint); text-transform: uppercase; }\n  .pulse-dot { fill: var(--accent); filter: drop-shadow(0 0 6px var(--accent)); }\n  .spin { transform-box: fill-box; transform-origin: center; animation: spin 9s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  @media (prefers-reduced-motion: reduce){ .spin { animation: none; } }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body data-hero=\"a\">\n\n  <!-- NAV -->\n  <nav class=\"nav\" id=\"nav\">\n    <div class=\"wrap nav-inner\">\n      <a class=\"brand\" href=\"#top\" aria-label=\"Closed Loop home\">\n        <span class=\"glyph\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\">\n            <circle cx=\"16\" cy=\"16\" r=\"11.5\" stroke=\"var(--accent)\" stroke-width=\"2\" stroke-dasharray=\"58 14\" stroke-linecap=\"round\"><\u002Fcircle>\n            <path d=\"M22 6.2 L25.6 8.5 L21.7 11\" stroke=\"var(--accent)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <circle cx=\"16\" cy=\"16\" r=\"3\" fill=\"var(--fg)\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fspan>\n        Closed&nbsp;Loop\n      <\u002Fa>\n      <div class=\"nav-links\">\n        <a href=\"#concept\">Concept<\u002Fa>\n        <a href=\"#usecases\">Use Cases<\u002Fa>\n        <a href=\"#architecture\">Architecture<\u002Fa>\n        <a href=\"#rollout\">Rollout<\u002Fa>\n        <a href=\"#about\">About<\u002Fa>\n      <\u002Fdiv>\n      <a class=\"nav-cta\" href=\"mailto:darwinrlo@gmail.com\">Email me<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <span id=\"top\"><\u002Fspan>\n\n  <!-- HERO -->\n  <header class=\"hero\">\n    <div class=\"hero-bg\"><\u002Fdiv>\n    <div class=\"hero-grid-lines\"><\u002Fdiv>\n\n    <!-- HERO A — ORBIT -->\n    <div class=\"hero-variant\" id=\"hero-a\">\n      <div class=\"wrap\">\n        <div class=\"heroA-grid\">\n          <div class=\"heroA-head\">\n            <div class=\"eyebrow hero-tag reveal\">Fractional CTO · Self-improving systems<\u002Fdiv>\n            <h1 class=\"display reveal d1\">I build your <span class=\"accent-word\">mini-AGI<\u002Fspan>.<\u002Fh1>\n            <p class=\"hero-sub reveal d2\">A <strong>self-improving, closed-loop company<\u002Fstrong> — one that monitors its own output and tunes its own process every night. I help Series&nbsp;A+ teams turn their operations into that system.<\u002Fp>\n            <div class=\"hero-actions reveal d3\">\n              <a class=\"btn btn-primary\" href=\"mailto:darwinrlo@gmail.com\">Email me <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n              <a class=\"btn btn-ghost\" href=\"#architecture\">See the architecture<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"reveal d2\">\n            <div class=\"orbit-wrap\" id=\"orbit-a\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HERO B — STATEMENT -->\n    <div class=\"hero-variant\" id=\"hero-b\">\n      <div class=\"wrap\">\n        <div class=\"eyebrow hero-tag reveal\">Fractional CTO · Self-improving systems<\u002Fdiv>\n        <h1 class=\"display reveal d1\">I build your<br><span class=\"accent-word\">mini-AGI<\u002Fspan>.<\u002Fh1>\n        <div class=\"heroB-meta reveal d2\">\n          <div class=\"item\"><div class=\"k\">The thesis<\u002Fdiv><div class=\"v\">Run your company as a closed loop — self-regulating, self-improving.<\u002Fdiv><\u002Fdiv>\n          <div class=\"item\"><div class=\"k\">For<\u002Fdiv><div class=\"v\">Series A+ teams scaling operations without scaling headcount.<\u002Fdiv><\u002Fdiv>\n          <div class=\"item\"><div class=\"k\">Engagement<\u002Fdiv><div class=\"v\">Context, then workflows, then a system that improves itself.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"heroB-line reveal d3\"><\u002Fdiv>\n        <div class=\"hero-actions reveal d3\">\n          <a class=\"btn btn-primary\" href=\"mailto:darwinrlo@gmail.com\">Email me <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n          <a class=\"btn btn-ghost\" href=\"#concept\">What is a mini-AGI?<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HERO C — SYSTEM PANEL -->\n    <div class=\"hero-variant\" id=\"hero-c\">\n      <div class=\"wrap\">\n        <div class=\"heroC-grid\">\n          <div>\n            <div class=\"eyebrow hero-tag reveal\">Fractional CTO · Self-improving systems<\u002Fdiv>\n            <h1 class=\"display reveal d1\" style=\"font-size:clamp(2.6rem,6.4vw,5.4rem)\">I build your <span class=\"accent-word\">mini-AGI<\u002Fspan>.<\u002Fh1>\n            <p class=\"hero-sub reveal d2\">An internal agent that runs your company as a <strong>closed loop<\u002Fstrong> — it processes the work, finds its own gaps, and ships its own upgrades overnight.<\u002Fp>\n            <div class=\"hero-actions reveal d3\">\n              <a class=\"btn btn-primary\" href=\"mailto:darwinrlo@gmail.com\">Email me <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n              <a class=\"btn btn-ghost\" href=\"#rollout\">How rollout works<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"reveal d2\">\n            <div class=\"panel\">\n              <div class=\"panel-bar\">\n                <div class=\"panel-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n                <div class=\"panel-title\">mini-agi · nightly run<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"panel-body\">\n                <div class=\"log-row\"><span class=\"lbl\">context-layer<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-ok\">synced<\u002Fspan><\u002Fdiv>\n                <div class=\"log-row\"><span class=\"lbl\">support-agent<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-run\">114 emails<\u002Fspan><\u002Fdiv>\n                <div class=\"log-row\"><span class=\"lbl\">tickets-closed<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-ok\">+27 today<\u002Fspan><\u002Fdiv>\n                <div class=\"log-row\"><span class=\"lbl\">monitor<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-build\">3 gaps found<\u002Fspan><\u002Fdiv>\n                <div class=\"log-row\"><span class=\"lbl\">coding-agent<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-build\">PR #1284 ↗<\u002Fspan><\u002Fdiv>\n                <div class=\"log-row\"><span class=\"lbl\">status<\u002Fspan><span class=\"dots\"><\u002Fspan><span class=\"val tag-ok\">loop closed<span class=\"cursor\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- QUOTE 1 -->\n  <section class=\"quote wide\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote>With self-improving agents, your company should run as a closed loop.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Diana Hu<\u002Fspan><span class=\"role\">YC Partner<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONCEPT -->\n  <section class=\"section-pad\" id=\"concept\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-num\">01<\u002Fspan><span class=\"eyebrow\">The Concept<\u002Fspan>\n      <\u002Fdiv>\n      <hr class=\"rule reveal\">\n      <div class=\"two-col\" style=\"margin-top:48px\">\n        <div class=\"reveal\">\n          <h2 class=\"lead\">Your company, as a <span class=\"dim\">closed loop.<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <div class=\"body-col reveal d1\">\n          <p>Most companies run as <strong>open loops<\u002Fstrong>: you make a decision, execute it, and move on — rarely measuring the outcome and adjusting the process in any systematic way.<\u002Fp>\n          <p>A <strong>mini-AGI<\u002Fstrong> — Jack Dorsey's term for a self-improving agent — closes that loop. It continuously watches its own output and tunes its own process to better hit the goal. The rapid advances of the last several months made this practical, not theoretical.<\u002Fp>\n          <p>That's the whole engagement: I turn your operations into a self-regulating system, then hand you the keys.<\u002Fp>\n\n          <div class=\"loop-compare\">\n            <div class=\"lc-card lc-open\">\n              <svg width=\"100%\" height=\"44\" viewBox=\"0 0 200 44\" fill=\"none\" aria-hidden=\"true\">\n                <path d=\"M8 22 H150\" stroke=\"var(--fg-faint)\" stroke-width=\"1.5\"><\u002Fpath>\n                <path d=\"M150 22 l-9 -5 v10 z\" fill=\"var(--fg-faint)\"><\u002Fpath>\n                <circle cx=\"8\" cy=\"22\" r=\"4\" fill=\"var(--fg-faint)\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div class=\"tag\">Open loop<\u002Fdiv>\n              <div class=\"desc\">Decide → execute → move on. The outcome is rarely measured or fed back.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"lc-card lc-closed\">\n              <svg width=\"100%\" height=\"44\" viewBox=\"0 0 200 44\" fill=\"none\" aria-hidden=\"true\">\n                <path d=\"M100 22 m-34 0 a34 13 0 1 1 68 0 a34 13 0 1 1 -68 0\" stroke=\"var(--accent)\" stroke-width=\"1.6\" fill=\"none\"><\u002Fpath>\n                <path d=\"M134 18 l3 4 l-5 2 z\" fill=\"var(--accent)\"><\u002Fpath>\n                <circle cx=\"66\" cy=\"22\" r=\"3.4\" fill=\"var(--accent)\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div class=\"tag\">Closed loop<\u002Fdiv>\n              <div class=\"desc\">Self-regulating. It monitors output and adjusts the process to meet the goal.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE 2 (long, Diana Hu open/closed) -->\n  <section class=\"quote\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote style=\"max-width:34ch;font-size:clamp(1.25rem,2.4vw,1.9rem);line-height:1.32\">In the old world, companies basically ran as open loops. You made a decision, executed it, and didn't always systematically measure the outcome and adjust the process…. A closed loop, on the other hand, is self-regulating. It continuously monitors its output and adjusts its process to better meet the stated goal…. With self-improving agents, your company should run as a closed loop.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Diana Hu<\u002Fspan><span class=\"role\">YC Partner<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- USE CASES -->\n  <section class=\"section-pad\" id=\"usecases\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-num\">02<\u002Fspan><span class=\"eyebrow\">Use Cases<\u002Fspan>\n      <\u002Fdiv>\n      <hr class=\"rule reveal\">\n      <div class=\"two-col\" style=\"margin-top:48px\">\n        <div class=\"reveal\"><h2 class=\"lead\">What it does on <span class=\"dim\">day one.<\u002Fspan><\u002Fh2><\u002Fdiv>\n        <div class=\"body-col reveal d1\">\n          <p>Give the agent a read-only copy of your database and codebase — refreshed on every release — and it can answer almost anything about how your business actually works. From there, it takes real work off your team's plate.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"uc-grid\">\n        <div class=\"uc reveal\">\n          <div class=\"ix\">A<\u002Fdiv>\n          <h3>Customer support<\u002Fh3>\n          <p>Reads your business logic straight from the codebase — subscription rules, where features live — and resolves tickets on its own.<\u002Fp>\n          <div class=\"stat\">100+ emails/day · 400+ tickets closed<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uc reveal d1\">\n          <div class=\"ix\">B<\u002Fdiv>\n          <h3>CRM &amp; meetings<\u002Fh3>\n          <p>Updates your CRM after every call and collects user feedback across all of your channels — no founder time required.<\u002Fp>\n          <div class=\"stat\">Always up to date<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uc reveal d2\">\n          <div class=\"ix\">C<\u002Fdiv>\n          <h3>Sprint planning<\u002Fh3>\n          <p>Pulls from your support platform, sales calls, and Notion to plan the next sprint as a closed loop.<\u002Fp>\n          <div class=\"stat\">Pylon + calls + Notion<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uc reveal\">\n          <div class=\"ix\">D<\u002Fdiv>\n          <h3>Growth experiments<\u002Fh3>\n          <p>Reads product analytics to find where users drop off, designs and implements an A/B test, then deploys the winner.<\u002Fp>\n          <div class=\"stat\">Analyze → test → ship<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uc reveal d1\">\n          <div class=\"ix\">E<\u002Fdiv>\n          <h3>Ask anything<\u002Fh3>\n          <p>“What's the status of this lead?” “What are customer X's open issues?” Instantly queryable, with cited answers.<\u002Fp>\n          <div class=\"stat\">One question, one source<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uc reveal d2\">\n          <div class=\"ix\">F<\u002Fdiv>\n          <h3>Creative ops<\u002Fh3>\n          <p>Agents are already creating and testing video ads automatically — the loop extends to the top of the funnel too.<\u002Fp>\n          <div class=\"stat\">Create → test → iterate<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE 3 (Ayush ARR) -->\n  <section class=\"quote\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote>So we've been able to do over $2&nbsp;million in ARR largely being two full-time employees, which is myself and my co-founder.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Ayush Garg<\u002Fspan><span class=\"role\">AnswerThis · YC F25<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ARCHITECTURE -->\n  <section class=\"section-pad\" id=\"architecture\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-num\">03<\u002Fspan><span class=\"eyebrow\">The Architecture<\u002Fspan>\n      <\u002Fdiv>\n      <hr class=\"rule reveal\">\n      <div class=\"two-col\" style=\"margin-top:48px\">\n        <div class=\"reveal\"><h2 class=\"lead\">Five parts. <span class=\"dim\">One loop.<\u002Fspan><\u002Fh2><\u002Fdiv>\n        <div class=\"body-col reveal d1\">\n          <p>A mini-AGI isn't a single product — it's a handful of components wired into a cycle. Here's the build I assemble for you, and the tools I reach for first.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"arch-grid\">\n        <div class=\"arch-list\">\n          <div class=\"arch-item reveal\">\n            <div class=\"n\">01<\u002Fdiv>\n            <div>\n              <h3>Harness <span class=\"vendor\">Hermes Agent<\u002Fspan><\u002Fh3>\n              <p>The core. Enforces the security policy, schedules background jobs, and makes the actual LLM calls — with self-improvement built in.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arch-item reveal d1\">\n            <div class=\"n\">02<\u002Fdiv>\n            <div>\n              <h3>Interface <span class=\"vendor\">Slack<\u002Fspan><\u002Fh3>\n              <p>You talk to it in chat. The models are good enough to design visual interfaces on the fly and render them inline.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arch-item reveal d2\">\n            <div class=\"n\">03<\u002Fdiv>\n            <div>\n              <h3>Context layer <span class=\"vendor\">GBrain<\u002Fspan><\u002Fh3>\n              <p>A warehouse for all company knowledge. Every workflow produces an artifact that's ingested, retrieved, and answered with citations.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arch-item reveal\">\n            <div class=\"n\">04<\u002Fdiv>\n            <div>\n              <h3>Cloud coding agent <span class=\"vendor\">Minions · Inspect<\u002Fspan><\u002Fh3>\n              <p>Sandboxed and unattended. One-shots tasks from a Slack message into a pull request that passes CI and is ready for review.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arch-item reveal d1\">\n            <div class=\"n\">05<\u002Fdiv>\n            <div>\n              <h3>Monitoring agent <span class=\"vendor\">Nightly<\u002Fspan><\u002Fh3>\n              <p>Each night it analyzes the day for gaps, specs the fix — a tool, a skill, a view — and hands it to the coding agent. A PR waits for you by morning.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"arch-visual reveal d1\">\n          <div class=\"bigloop\" id=\"bigloop\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE 4 (Diana software factory) -->\n  <section class=\"quote\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote style=\"max-width:32ch;font-size:clamp(1.2rem,2.3vw,1.8rem);line-height:1.34\">With software factories, humans write a spec and a set of tests that define success, and then AI agents generate the implementation and code, and iterate until the tests pass. The human defines what to build and judges the output; the actual code is the agent's job.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Diana Hu<\u002Fspan><span class=\"role\">YC Partner<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ROLLOUT -->\n  <section class=\"section-pad\" id=\"rollout\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-num\">04<\u002Fspan><span class=\"eyebrow\">How Rollout Works<\u002Fspan>\n      <\u002Fdiv>\n      <hr class=\"rule reveal\">\n      <div class=\"two-col\" style=\"margin-top:48px\">\n        <div class=\"reveal\"><h2 class=\"lead\">Three phases to a <span class=\"dim\">self-improving company.<\u002Fspan><\u002Fh2><\u002Fdiv>\n        <div class=\"body-col reveal d1\">\n          <p>We don't boil the ocean. We stand up value early, encode your real workflows, then close the loop so the system improves on its own.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phases\">\n        <div class=\"phase reveal\">\n          <div class=\"pn\">Phase 01<\u002Fdiv>\n          <h3>Context<\u002Fh3>\n          <p>Stand up the context layer, ingest all company data, and wire jobs to auto-ingest new data. Set up an MCP server with tools for every system you run.<\u002Fp>\n          <div class=\"out\"><b>You get:<\u002Fb> instant answers to questions that used to take hours — lead status, a customer's open issues.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase reveal d1\">\n          <div class=\"pn\">Phase 02<\u002Fdiv>\n          <h3>Workflows<\u002Fh3>\n          <p>Audit the workflows across your company. We build the tools that are missing, and let non-engineers encode their own workflows as skills — each one a closed loop.<\u002Fp>\n          <div class=\"out\"><b>You get:<\u002Fb> the daily work of the company, captured as repeatable, self-correcting processes.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase reveal d2\">\n          <div class=\"pn\">Phase 03<\u002Fdiv>\n          <h3>Self-improvement<\u002Fh3>\n          <p>Stand up the monitoring agent and cloud coding agent so the mini-AGI improves itself. We start the coding agent early so engineering benefits right away.<\u002Fp>\n          <div class=\"out\"><b>You get:<\u002Fb> a system that finds its own gaps and ships its own upgrades overnight.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"feedback-note reveal\">Throughout every stage, your feedback is stored in the agent's memory — so it keeps getting more yours.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE 5 (Tom Blomfield 5x) -->\n  <section class=\"quote wide\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote>We are seeing companies get to Demo Day with about 5x more revenue per employee than they did 18 months ago.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Tom Blomfield<\u002Fspan><span class=\"role\">Cofounder of Monzo · YC Partner<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section class=\"section-pad about\" id=\"about\">\n    <div class=\"wrap\">\n      <div class=\"sec-head reveal\">\n        <span class=\"sec-num\">05<\u002Fspan><span class=\"eyebrow\">About<\u002Fspan>\n      <\u002Fdiv>\n      <hr class=\"rule reveal\">\n      <div class=\"about-grid\" style=\"margin-top:48px\">\n        <div class=\"reveal\">\n          <h2 class=\"about-lead\">I've shipped at the edge of new technology before. Now I build mini-AGIs.<\u002Fh2>\n          <div class=\"creds\">\n            <div class=\"cred reveal d1\"><div class=\"y\">Stanford<\u002Fdiv><div class=\"t\">B.S. Computer Science <span>· the fundamentals<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cred reveal d1\"><div class=\"y\">YC W15<\u002Fdiv><div class=\"t\">Y Combinator <span>· Winter 2015 batch<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cred reveal d2\"><div class=\"y\">$17M<\u002Fdiv><div class=\"t\">Cofounded a blockchain company <span>· $17M ICO<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cred reveal d2\"><div class=\"y\">Today<\u002Fdiv><div class=\"t\">Fractional CTO <span>· Closed Loop<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"about-body reveal d1\">\n          <p>I'm Darwin — a technical founder turned fractional CTO. I went through Y&nbsp;Combinator in Winter 2015, then cofounded a blockchain company that raised a <strong>$17&nbsp;million ICO<\u002Fstrong> for a secure data platform. I have a CS degree from Stanford.<\u002Fp>\n          <p>I've never been more excited about startups. The platforms now promising you a mini-AGI have a problem: you'd be ceding control of essential assets to a third party — and the product won't actually work without their forward-deployed engineers landing and expanding inside your company.<\u002Fp>\n          <p><strong>You don't need a platform. You need someone who builds the loop with you and hands it over.<\u002Fstrong> You cannot outsource your conviction on these tools — but you can have a guide while you build it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE 6 (Diana conviction) -->\n  <section class=\"quote\">\n    <div class=\"wrap reveal\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <blockquote style=\"max-width:30ch\">You cannot outsource your conviction on the power of these tools. You need to develop it yourself.<\u002Fblockquote>\n      <cite><span class=\"bar\"><\u002Fspan><span class=\"who\">Diana Hu<\u002Fspan><span class=\"role\">YC Partner<\u002Fspan><\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section class=\"section-pad contact\" id=\"contact\">\n    <div class=\"glow\"><\u002Fdiv>\n    <div class=\"wrap\">\n      <div class=\"eyebrow reveal\" style=\"justify-content:center\">Let's build it<\u002Fdiv>\n      <h2 class=\"display reveal d1\" style=\"margin-top:22px\">Have your own<br>mini-AGI setup.<\u002Fh2>\n      <p class=\"contact-sub reveal d2\">If you need help with this, reach out. I'll help you stand up the context layer, encode your workflows, and close the loop — so your company runs itself a little more every night.<\u002Fp>\n      <a class=\"email-btn reveal d2\" href=\"mailto:darwinrlo@gmail.com\">darwinrlo<span class=\"at\">@<\u002Fspan>gmail.com<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer>\n    <div class=\"wrap foot-inner\">\n      <div class=\"l\">\n        <span class=\"glyph\" aria-hidden=\"true\" style=\"width:22px;height:22px;display:inline-block\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" style=\"width:100%;height:100%\">\n            <circle cx=\"16\" cy=\"16\" r=\"11.5\" stroke=\"var(--accent)\" stroke-width=\"2\" stroke-dasharray=\"58 14\" stroke-linecap=\"round\"><\u002Fcircle>\n            <circle cx=\"16\" cy=\"16\" r=\"3\" fill=\"var(--fg)\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fspan>\n        Closed Loop\n      <\u002Fdiv>\n      <div class=\"r\">\n        <span>Fractional CTO<\u002Fspan>\n        <a href=\"mailto:darwinrlo@gmail.com\">darwinrlo@gmail.com<\u002Fa>\n        <span>© 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- HERO SWITCHER -->\n  <div class=\"hero-switch\" role=\"group\" aria-label=\"Choose hero direction\">\n    <span class=\"hs-label\">Hero<\u002Fspan>\n    <button data-h=\"a\" class=\"active\">A · Orbit<\u002Fbutton>\n    <button data-h=\"b\">B · Statement<\u002Fbutton>\n    <button data-h=\"c\">C · System<\u002Fbutton>\n  <\u002Fdiv>\n\n  <script>\n  (function () {\n    // ---------- NAV scroll state ----------\n    var nav = document.getElementById('nav');\n    function onScroll(){ if (window.scrollY > 20) nav.classList.add('scrolled'); else nav.classList.remove('scrolled'); }\n    window.addEventListener('scroll', onScroll, { passive: true }); onScroll();\n\n    // ---------- Reveal on scroll (IO + scroll-sweep fallback) ----------\n    var io = new IntersectionObserver(function (entries) {\n      entries.forEach(function (e) {\n        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });\n    document.querySelectorAll('.reveal, .phase').forEach(function (el) { io.observe(el); });\n\n    // Fallback: some embedded contexts don't fire IO on initial paint.\n    function sweep(){\n      var vh = window.innerHeight || document.documentElement.clientHeight;\n      document.querySelectorAll('.reveal:not(.in), .phase:not(.in)').forEach(function(el){\n        var r = el.getBoundingClientRect();\n        if (r.top < vh * 0.92 && r.bottom > 0) { el.classList.add('in'); io.unobserve(el); }\n      });\n    }\n    window.addEventListener('scroll', sweep, { passive: true });\n    window.addEventListener('resize', sweep, { passive: true });\n    sweep();\n    requestAnimationFrame(sweep);\n    setTimeout(sweep, 120);\n\n    // CSS transitions are paused while a tab is hidden — snap content visible so it never renders blank.\n    function maybeInstant(){ if (document.hidden) document.body.classList.add('reveal-instant'); }\n    document.addEventListener('visibilitychange', maybeInstant);\n    maybeInstant();\n    // Hard safety net: if anything is still un-revealed shortly after load, show everything.\n    setTimeout(function(){ if (document.querySelectorAll('.reveal:not(.in)').length) document.body.classList.add('reveal-instant'); }, 1400);\n\n    // ---------- Hero switcher ----------\n    var STORE = 'cl_hero';\n    var btns = document.querySelectorAll('.hero-switch button');\n    function setHero(h, persist){\n      document.body.setAttribute('data-hero', h);\n      btns.forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-h') === h); });\n      if (persist) try { localStorage.setItem(STORE, h); } catch(e){}\n      // reveal the newly shown hero's content\n      var active = document.getElementById('hero-' + h);\n      if (active) active.querySelectorAll('.reveal').forEach(function(el){\n        el.classList.remove('in');\n        requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('in'); }); });\n      });\n    }\n    btns.forEach(function(b){ b.addEventListener('click', function(){ setHero(b.getAttribute('data-h'), true); }); });\n    var saved; try { saved = localStorage.getItem(STORE); } catch(e){}\n    if (saved && ['a','b','c'].indexOf(saved) > -1) setHero(saved, false);\n\n    // ---------- Loop / orbit SVG builder ----------\n    var SVGNS = 'http://www.w3.org/2000/svg';\n    function el(name, attrs){ var n = document.createElementNS(SVGNS, name); for (var k in attrs) n.setAttribute(k, attrs[k]); return n; }\n\n    function buildLoop(host, opts){\n      if (!host) return;\n      opts = opts || {};\n      var size = 400, cx = 200, cy = 200, r = 150;\n      var svg = el('svg', { viewBox: '0 0 ' + size + ' ' + size, width: '100%', height: '100%' });\n      svg.setAttribute('aria-hidden', 'true');\n\n      // faint track\n      svg.appendChild(el('circle', { cx: cx, cy: cy, r: r, class: 'ring-track' }));\n\n      // progress arc (decorative dashed segment that the pulse rides over)\n      var circ = 2 * Math.PI * r;\n      var prog = el('circle', { cx: cx, cy: cy, r: r, class: 'ring-prog' });\n      prog.setAttribute('stroke-dasharray', (circ*0.62) + ' ' + (circ*0.38));\n      prog.setAttribute('transform', 'rotate(-90 ' + cx + ' ' + cy + ')');\n      prog.setAttribute('opacity', '0.5');\n      svg.appendChild(prog);\n\n      // nodes\n      var nodes = opts.nodes || ['Context','Agent','Code','Monitor'];\n      var angles = [-90, 0, 90, 180];\n      nodes.forEach(function(label, i){\n        var a = angles[i % 4] * Math.PI/180;\n        var nx = cx + r*Math.cos(a), ny = cy + r*Math.sin(a);\n        svg.appendChild(el('circle', { cx: nx, cy: ny, r: 6, class: 'node-dot' + (i===0?' lit':'') }));\n        var t = el('text', { x: nx, y: ny, class: 'node-label' });\n        // label placement\n        if (i===0){ t.setAttribute('y', ny - 16); t.setAttribute('text-anchor','middle'); }\n        if (i===1){ t.setAttribute('x', nx + 14); t.setAttribute('text-anchor','start'); t.setAttribute('dominant-baseline','middle'); }\n        if (i===2){ t.setAttribute('y', ny + 24); t.setAttribute('text-anchor','middle'); }\n        if (i===3){ t.setAttribute('x', nx - 14); t.setAttribute('text-anchor','end'); t.setAttribute('dominant-baseline','middle'); }\n        t.textContent = label;\n        svg.appendChild(t);\n      });\n\n      // center label\n      var w1 = el('text', { x: cx, y: cy - 2, class: 'center-word', 'text-anchor':'middle' });\n      w1.setAttribute('font-size','30'); w1.textContent = 'mini-AGI';\n      svg.appendChild(w1);\n      var w2 = el('text', { x: cx, y: cy + 20, class: 'center-sub', 'text-anchor':'middle' });\n      w2.textContent = 'closed loop';\n      svg.appendChild(w2);\n\n      // traveling pulse: a rotating group containing a dot at the top of the ring\n      var g = el('g', { class: 'spin' });\n      g.setAttribute('style','transform-origin:' + cx + 'px ' + cy + 'px');\n      var pulse = el('circle', { cx: cx, cy: cy - r, r: 5, class: 'pulse-dot' });\n      g.appendChild(pulse);\n      svg.appendChild(g);\n\n      host.innerHTML = '';\n      host.appendChild(svg);\n    }\n\n    buildLoop(document.getElementById('orbit-a'));\n    buildLoop(document.getElementById('bigloop'));\n  })();\n  <\u002Fscript>\n\n  \n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
